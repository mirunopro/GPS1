<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>散歩記録</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:#111;color:#fff;font-family:'Hiragino Sans',sans-serif;}

#mapDiv{flex:1;min-height:0;position:relative;z-index:0;}

/* 上部バッジ */
#topBar{position:absolute;top:56px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:1000;pointer-events:none;}
.badge{border-radius:20px;padding:5px 10px;font-size:10px;}
#michi{background:rgba(0,0,60,0.85);border:1px solid rgba(100,150,255,0.4);color:#aac4ff;}
#gpsB{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:5px;color:#fff;}
.dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;}
.dot.on{background:#4ade80;animation:bl 1.5s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:0.2;}}

#msgBox{position:absolute;top:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border-radius:20px;padding:7px 18px;font-size:13px;white-space:nowrap;pointer-events:none;z-index:1000;opacity:0;transition:opacity 0.3s;max-width:90%;text-align:center;}

/* 検索バー - 最上部 */
#searchBar{
position:absolute;top:8px;left:8px;right:8px;
display:flex;gap:6px;z-index:1001;
}
#searchInput{
flex:1;height:36px;border-radius:10px;border:none;
padding:0 12px;font-size:14px;
background:rgba(255,255,255,0.97);color:#333;
-webkit-appearance:none;outline:none;
min-width:0;
}
#searchBtn{
height:36px;padding:0 12px;border-radius:10px;border:none;
background:#22c55e;color:#fff;font-size:13px;font-weight:bold;
-webkit-appearance:none;cursor:pointer;white-space:nowrap;
flex-shrink:0;
}

/* リアルタイム速度表示 */
#spdBig{
position:absolute;bottom:12px;left:12px;
background:rgba(0,0,0,0.75);border-radius:16px;
padding:8px 16px;z-index:1000;pointer-events:none;
border:1px solid rgba(74,222,128,0.4);
display:none;
}
#spdBigVal{font-size:32px;font-weight:900;color:#4ade80;line-height:1;}
#spdBigLbl{font-size:10px;color:#888;text-align:center;margin-top:2px;}

/* 下部UI - 固定高さ */
#bottomUI{
flex-shrink:0;
background:#1a1a1a;
padding:12px 16px 20px;
border-top:1px solid #333;
}
#stats{display:flex;gap:4px;margin-bottom:4px;}
#stats2{display:flex;gap:4px;margin-bottom:8px;}
.sb{flex:1;background:#222;border-radius:8px;padding:3px 2px;text-align:center;border:1px solid #333;}
.sv{font-size:12px;font-weight:700;color:#4ade80;}
.sl{font-size:7px;color:#666;margin-top:1px;}
#btns{display:flex;gap:6px;flex-wrap:wrap;}
#btnStart{flex:1;height:46px;border-radius:12px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:14px;font-weight:700;-webkit-appearance:none;cursor:pointer;}
#btnStop{flex:1;height:46px;border-radius:12px;border:none;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:14px;font-weight:700;-webkit-appearance:none;cursor:pointer;display:none;}
#btnOldMap{width:68px;height:52px;border-radius:12px;border:none;background:linear-gradient(135deg,#92400e,#78350f);color:#fff;font-size:12px;font-weight:bold;-webkit-appearance:none;cursor:pointer;}
#btnTaisho{width:68px;height:52px;border-radius:12px;border:none;background:linear-gradient(135deg,#7e22ce,#581c87);color:#fff;font-size:12px;font-weight:bold;-webkit-appearance:none;cursor:pointer;}
#btnShowa{width:68px;height:52px;border-radius:12px;border:none;background:linear-gradient(135deg,#374151,#1f2937);color:#fff;font-size:12px;font-weight:bold;-webkit-appearance:none;cursor:pointer;}
#btnOrt{width:68px;height:52px;border-radius:12px;border:none;background:linear-gradient(135deg,#1d4ed8,#1e3a8a);color:#fff;font-size:12px;font-weight:bold;-webkit-appearance:none;cursor:pointer;}
#btnRelief{width:68px;height:52px;border-radius:12px;border:none;background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff;font-size:11px;font-weight:bold;-webkit-appearance:none;cursor:pointer;}
#btnClear{width:46px;height:46px;border-radius:12px;border:none;background:#2a2a2a;color:#888;font-size:16px;-webkit-appearance:none;cursor:pointer;}
</style>

</head>
<body>

<div id="mapDiv">
  <div id="topBar">
    <div class="badge" id="michi">🛰 みちびき対応GPS</div>
    <div class="badge" id="gpsB"><div class="dot" id="gpsDot"></div><span id="gpsT">GPS待機</span></div>
  </div>
  <div id="searchBar">
    <input id="searchInput" type="text" placeholder="🔍 都市・住所を検索..." />
    <button id="searchBtn" onclick="doSearch()">移動</button>
  </div>
  <div id="msgBox"></div>
  <div id="spdBig">
    <div id="spdBigVal">0.0</div>
    <div id="spdBigLbl">km/h</div>
  </div>
</div>

<div id="bottomUI">
  <div id="stats">
    <div class="sb"><div class="sv" id="dVal">0.00</div><div class="sl">距離 km</div></div>
    <div class="sb"><div class="sv" id="tVal">00:00</div><div class="sl">時間</div></div>
  </div>
  <div id="stats2">
    <div class="sb"><div class="sv" id="altVal">--</div><div class="sl">🏔 標高 m</div></div>
    <div class="sb"><div class="sv" id="spdVal">--</div><div class="sl">💨 速度 km/h</div></div>
  </div>
  <div id="btns">
    <button id="btnStart" onclick="startWalk()">▶ スタート</button>
    <button id="btnStop"  onclick="stopWalk()">■ ストップ</button>
    <button id="btnTaisho" onclick="toggleTaisho()">明治期</button>
    <button id="btnShowa" onclick="toggleShowa()">終戦直後</button>
    <button id="btnOldMap" onclick="toggleMeiji()">60年代</button>
    <button id="btnOrt" onclick="toggleOrt()">70年代</button>
    <button id="btnRelief" onclick="toggleRelief()">🌋標高図</button>
    <button id="btnClear" onclick="clearAll()">🗑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// Leaflet地図初期化
var map = L.map('mapDiv', {
  center: [35.6812, 139.7671],
  zoom: 17,
  zoomControl: false,
  attributionControl: false
});

// ズームボタンを右下に配置
L.control.zoom({position: 'bottomright'}).addTo(map);

// タイルレイヤー（現代・古地図切替）
var modernTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 22,
  maxNativeZoom: 19
});
var oldTile = null;

// 空中写真タイル（正確な年代）
// ort_1928=1928年頃、ort_USA10=1945〜1950年、ort_old10=1961〜1969年、gazo1=1974〜1978年
var taishoTile = L.tileLayer('https://nlftp.mlit.go.jp/kokjo/inspect/tile/landclassification/land_history/landuseclassification/landuseclassification1/{z}/{x}/{y}.png', {
  maxZoom:22, maxNativeZoom:16, opacity:1.0
});
var showaTile = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png', {
  maxZoom:22, maxNativeZoom:17, opacity:1.0
});
var meijiTile = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png', {
  maxZoom:22, maxNativeZoom:17, opacity:1.0
});
var ortTileLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg', {
  maxZoom:22, maxNativeZoom:17, opacity:1.0
});
var taishoVisible = false;
var showaVisible = false;

var meijiVisible = false;
var ortVisible = false;
modernTile.addTo(map);

function toggleTaisho() {
  var btn = document.getElementById('btnTaisho');
  if (taishoVisible) {
    map.removeLayer(taishoTile);
    taishoVisible = false;
    btn.style.opacity = '1';
    if (!showaVisible && !meijiVisible && !ortVisible) modernTile.addTo(map);
    if (reliefVisible) reliefTile.bringToFront();
    showMsg('明治地図を非表示', 2000);
  } else {
    hideRelief();
    if (showaVisible) { map.removeLayer(showaTile); showaVisible = false; document.getElementById('btnShowa').style.opacity='1'; }
    if (meijiVisible) { map.removeLayer(meijiTile); meijiVisible = false; document.getElementById('btnOldMap').style.opacity='1'; }
    if (ortVisible) { map.removeLayer(ortTileLayer); ortVisible = false; document.getElementById('btnOrt').style.opacity='1'; }
    map.removeLayer(modernTile);
    taishoTile.addTo(map);
    taishoVisible = true;
    btn.style.opacity = '0.5';
    showMsg('🗺 明治期の土地利用図に切替', 2500);
  }
}

function toggleShowa() {
  var btn = document.getElementById('btnShowa');
  if (showaVisible) {
    map.removeLayer(showaTile);
    showaVisible = false;
    btn.style.opacity = '1';
    if (!meijiVisible && !ortVisible) modernTile.addTo(map);
    if (reliefVisible) reliefTile.bringToFront();
    showMsg('終戦直後の写真を非表示', 2000);
  } else {
    hideRelief();
    if (taishoVisible) { map.removeLayer(taishoTile); taishoVisible = false; document.getElementById('btnTaisho').style.opacity='1'; }
    if (meijiVisible) { map.removeLayer(meijiTile); meijiVisible = false; document.getElementById('btnOldMap').style.opacity='1'; }
    if (ortVisible) { map.removeLayer(ortTileLayer); ortVisible = false; document.getElementById('btnOrt').style.opacity='1'; }
    map.removeLayer(modernTile);
    showaTile.addTo(map);
    showaVisible = true;
    btn.style.opacity = '0.5';
    showMsg('📷 1945〜1950年の空中写真に切替', 2500);
  }
}

function toggleMeiji() {
  var btn = document.getElementById('btnOldMap');
  if (meijiVisible) {
    map.removeLayer(meijiTile);
    meijiVisible = false;
    btn.style.opacity = '1';
    if (!ortVisible) modernTile.addTo(map);
    if (reliefVisible) reliefTile.bringToFront();
    showMsg('昭和初期の写真を非表示', 2000);
  } else {
    hideRelief();
    if (ortVisible) { map.removeLayer(ortTileLayer); ortVisible = false; document.getElementById('btnOrt').style.opacity='1'; }
    if (showaVisible) { map.removeLayer(showaTile); showaVisible = false; document.getElementById('btnShowa').style.opacity='1'; }
    if (taishoVisible) { map.removeLayer(taishoTile); taishoVisible = false; document.getElementById('btnTaisho').style.opacity='1'; }
    map.removeLayer(modernTile);
    meijiTile.addTo(map);
    meijiVisible = true;
    btn.style.opacity = '0.5';
    showMsg('🗺 1961〜1969年の空中写真に切替', 2500);
  }
}

function toggleOrt() {
  var btn = document.getElementById('btnOrt');
  if (ortVisible) {
    map.removeLayer(ortTileLayer);
    ortVisible = false;
    btn.style.opacity = '1';
    if (!meijiVisible) modernTile.addTo(map);
    if (reliefVisible) reliefTile.bringToFront();
    showMsg('空中写真を非表示', 2000);
  } else {
    hideRelief();
    if (meijiVisible) { map.removeLayer(meijiTile); meijiVisible = false; document.getElementById('btnOldMap').style.opacity='1'; }
    if (showaVisible) { map.removeLayer(showaTile); showaVisible = false; document.getElementById('btnShowa').style.opacity='1'; }
    if (taishoVisible) { map.removeLayer(taishoTile); taishoVisible = false; document.getElementById('btnTaisho').style.opacity='1'; }
    map.removeLayer(modernTile);
    ortTileLayer.addTo(map);
    ortVisible = true;
    btn.style.opacity = '0.5';
    showMsg('📷 1974〜1978年の空中写真に切替', 2500);
  }
}



function hideRelief() {
  if (reliefVisible) {
    map.removeLayer(reliefTile);
    reliefVisible = false;
    document.getElementById('btnRelief').style.opacity = '1';
  }
}

// ===== 色別標高図 =====
var reliefVisible = false;
var reliefTile = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/relief/{z}/{x}/{y}.png', {
  maxZoom: 22, maxNativeZoom: 15, opacity: 0.7
});

function toggleRelief() {
  var btn = document.getElementById('btnRelief');
  if (reliefVisible) {
    map.removeLayer(reliefTile);
    reliefVisible = false;
    btn.style.opacity = '1';
    showMsg('標高図を非表示', 2000);
  } else {
    reliefTile.addTo(map);
    reliefVisible = true;
    btn.style.opacity = '0.5';
    showMsg('🌋 色別標高図を表示（重ねて表示）', 2500);
  }
}

// ===== 都市・住所検索 =====
function doSearch() {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  showMsg('🔍 検索中...', 3000);

  var url = 'https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(q);

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data || data.length === 0) {
        showMsg('見つかりませんでした', 3000);
        return;
      }
      // 都道府県・政令市・市区町村を優先（townよりcityを優先）
      var result = data[0];
      for (var i = 0; i < data.length; i++) {
        var t = data[i].properties.addressType;
        if (t === '市区町村' || t === '都道府県') { result = data[i]; break; }
      }
      var lng = parseFloat(result.geometry.coordinates[0]);
      var lat = parseFloat(result.geometry.coordinates[1]);
      var name = result.properties.title;
      map.setView([lat, lng], 13, {animate: true});
      showMsg('📍 ' + name, 3000);
      document.getElementById('searchInput').blur();
    })
    .catch(function() {
      showMsg('検索エラー', 3000);
    });
}

// Enterキーで検索
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });
});


var routeLine = L.polyline([], {
  color: '#22c55e',
  weight: 5,
  opacity: 0.9
}).addTo(map);

// 現在地マーカー
var myIcon = L.divIcon({
  html: '<div style="width:18px;height:18px;border-radius:50%;background:#4ade80;border:3px solid #fff;box-shadow:0 0 0 6px rgba(74,222,128,0.3);"></div>',
  iconSize: [18,18],
  iconAnchor: [9,9],
  className: ''
});
var myMarker = null;

// スタート地点マーカー
var startMarker = null;
var startIcon = L.divIcon({
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#22c55e;border:2px solid #fff;"></div>',
  iconSize: [14,14],
  iconAnchor: [7,7],
  className: ''
});

// GPS・歩行
var walking = false;
var watchId = null;
var startTime = null;
var timerInv = null;
var totalKm = 0;
var path = [];

function showMsg(txt, ms) {
  var el = document.getElementById('msgBox');
  el.textContent = txt;
  el.style.opacity = 1;
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity=0; }, ms||2500);
}

function startWalk() {
  if (!navigator.geolocation) { showMsg('GPSが使えません',3000); return; }
  walking=true; path=[]; totalKm=0; startTime=Date.now();
  routeLine.setLatLngs([]);
  if (startMarker) { map.removeLayer(startMarker); startMarker=null; }
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='flex';
  document.getElementById('gpsDot').className='dot on';
  document.getElementById('gpsT').textContent='記録中';
  document.getElementById('spdBig').style.display='block';
  // localStorage初期化
  try { localStorage.setItem('sanpo_path', '[]'); localStorage.setItem('sanpo_km','0'); localStorage.setItem('sanpo_start', Date.now()); } catch(e){}
  showMsg('🚶 スタート！');
  timerInv = setInterval(tickTimer, 1000);
  watchId = navigator.geolocation.watchPosition(onGPS, onErr,
    {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopWalk() {
  walking=false;
  if(watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timerInv);
  document.getElementById('btnStart').style.display='flex';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('gpsDot').className='dot';
  document.getElementById('gpsT').textContent='停止';
  document.getElementById('spdBig').style.display='none';
  // 完了データをlocalStorageに保存
  try { localStorage.setItem('sanpo_walking','0'); } catch(e){}
  showMsg('🏁 '+totalKm.toFixed(2)+'km 完了！', 4000);
}

function clearAll() {
  path=[]; totalKm=0;
  routeLine.setLatLngs([]);
  if(startMarker){map.removeLayer(startMarker);startMarker=null;}
  document.getElementById('dVal').textContent='0.00';
  document.getElementById('tVal').textContent='00:00';
  document.getElementById('altVal').textContent='--';
  document.getElementById('spdVal').textContent='--';
  document.getElementById('spdBig').style.display='none';
  document.getElementById('spdBigVal').textContent='0.0';
  try { localStorage.removeItem('sanpo_path'); localStorage.removeItem('sanpo_km'); localStorage.removeItem('sanpo_start'); localStorage.removeItem('sanpo_walking'); } catch(e){}
  showMsg('クリアしました');
}

function onGPS(pos) {
  var lat=pos.coords.latitude, lng=pos.coords.longitude;
  var acc=Math.round(pos.coords.accuracy);
  document.getElementById('gpsT').textContent='±'+acc+'m';

  // 標高
  var alt = pos.coords.altitude;
  if (alt !== null && alt !== undefined) {
    document.getElementById('altVal').textContent = Math.round(alt);
  }

  // 速度
  var spd = pos.coords.speed;
  if (spd !== null && spd !== undefined && spd >= 0) {
    var spdKmh = (spd * 3.6).toFixed(1);
    document.getElementById('spdVal').textContent = spdKmh;
    document.getElementById('spdBigVal').textContent = spdKmh;
  }

  // マーカー更新
  if (!myMarker) {
    myMarker = L.marker([lat,lng], {icon:myIcon, zIndexOffset:1000}).addTo(map);
  } else {
    myMarker.setLatLng([lat,lng]);
  }
  map.setView([lat,lng], map.getZoom(), {animate:true, duration:0.5});

  if (walking) {
    if (path.length > 0) {
      var last=path[path.length-1];
      var d=haversine(last[0],last[1],lat,lng);
      if (d > 0.003 && d < 0.3) {
        totalKm+=d;
        path.push([lat,lng]);
        routeLine.setLatLngs(path);
        document.getElementById('dVal').textContent=totalKm.toFixed(2);
        // localStorageに保存（復元用）
        try {
          localStorage.setItem('sanpo_path', JSON.stringify(path));
          localStorage.setItem('sanpo_km', totalKm.toFixed(3));
          localStorage.setItem('sanpo_walking', '1');
        } catch(e){}
      }
    } else {
      path.push([lat,lng]);
      routeLine.setLatLngs(path);
      startMarker = L.marker([lat,lng], {icon:startIcon}).addTo(map);
      try { localStorage.setItem('sanpo_path', JSON.stringify(path)); } catch(e){}
    }
  }
}

function onErr(e) { showMsg('GPSエラー: '+e.message, 3000); }

function tickTimer() {
  if (!startTime) return;
  var s=Math.floor((Date.now()-startTime)/1000);
  var m=Math.floor(s/60), ss=s%60;
  document.getElementById('tVal').textContent=(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}

function haversine(lat1,lng1,lat2,lng2) {
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 起動時GPS取得 + ルート復元
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {
    map.setView([pos.coords.latitude, pos.coords.longitude], 17);
    myMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {icon:myIcon}).addTo(map);
    showMsg('📍 現在地を取得しました');
  }, function() {
    showMsg('現在地を取得できませんでした', 3000);
  }, {enableHighAccuracy:true, timeout:10000});
}

// localStorage からルート復元
try {
  var savedPath = localStorage.getItem('sanpo_path');
  var savedKm   = localStorage.getItem('sanpo_km');
  var savedWalking = localStorage.getItem('sanpo_walking');
  var savedStart = localStorage.getItem('sanpo_start');

  if (savedPath) {
    var restored = JSON.parse(savedPath);
    if (restored && restored.length > 1) {
      path = restored;
      totalKm = savedKm ? parseFloat(savedKm) : 0;
      routeLine.setLatLngs(path);
      // スタートマーカー復元
      startMarker = L.marker([path[0][0], path[0][1]], {icon:startIcon}).addTo(map);
      document.getElementById('dVal').textContent = totalKm.toFixed(2);
      // 記録中だったら再開
      if (savedWalking === '1') {
        walking = true;
        startTime = savedStart ? parseInt(savedStart) : Date.now();
        document.getElementById('btnStart').style.display='none';
        document.getElementById('btnStop').style.display='flex';
        document.getElementById('gpsDot').className='dot on';
        document.getElementById('gpsT').textContent='記録中';
        document.getElementById('spdBig').style.display='block';
        timerInv = setInterval(tickTimer, 1000);
        watchId = navigator.geolocation.watchPosition(onGPS, onErr,
          {enableHighAccuracy:true, timeout:15000, maximumAge:0});
        showMsg('📍 記録を再開しました', 3000);
      } else {
        showMsg('📍 前回のルートを復元しました', 3000);
      }
    }
  }
} catch(e) {}
</script>

</body>
</html>
