<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>散歩記録</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:#111;color:#fff;font-family:'Hiragino Sans',sans-serif;}

#mapDiv{flex:1;min-height:0;position:relative;z-index:0;}

/* 上部バッジ */
#topBar{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:1000;pointer-events:none;}
.badge{border-radius:20px;padding:6px 12px;font-size:11px;}
#michi{background:rgba(0,0,60,0.85);border:1px solid rgba(100,150,255,0.4);color:#aac4ff;}
#gpsB{background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:5px;color:#fff;}
.dot{width:8px;height:8px;border-radius:50%;background:#666;flex-shrink:0;}
.dot.on{background:#4ade80;animation:bl 1.5s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:0.2;}}

#msgBox{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border-radius:20px;padding:7px 18px;font-size:13px;white-space:nowrap;pointer-events:none;z-index:1000;opacity:0;transition:opacity 0.3s;max-width:90%;text-align:center;}

/* リアルタイム速度表示 */
#spdBig{
position:absolute;bottom:12px;left:12px;
background:rgba(0,0,0,0.75);border-radius:16px;
padding:8px 16px;z-index:1000;pointer-events:none;
border:1px solid rgba(74,222,128,0.4);
display:none;
}
#spdBigVal{font-size:32px;font-weight:900;color:#4ade80;line-height:1;}
#spdBigLbl{font-size:10px;color:#888;text-align:center;margin-top:2px;}

/* 下部UI - 固定高さ */
#bottomUI{
flex-shrink:0;
background:#1a1a1a;
padding:12px 16px 20px;
border-top:1px solid #333;
}
#stats{display:flex;gap:8px;margin-bottom:8px;}
#stats2{display:flex;gap:8px;margin-bottom:12px;}
.sb{flex:1;background:#222;border-radius:12px;padding:8px 4px;text-align:center;border:1px solid #333;}
.sv{font-size:18px;font-weight:700;color:#4ade80;}
.sl{font-size:9px;color:#666;margin-top:2px;}
#btns{display:flex;gap:10px;}
#btnStart{flex:1;height:54px;border-radius:14px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:16px;font-weight:700;-webkit-appearance:none;cursor:pointer;}
#btnStop{flex:1;height:54px;border-radius:14px;border:none;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:16px;font-weight:700;-webkit-appearance:none;cursor:pointer;display:none;}
#btnSpot{width:54px;height:54px;border-radius:14px;border:none;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:22px;-webkit-appearance:none;cursor:pointer;}
#btnClear{width:54px;height:54px;border-radius:14px;border:none;background:#2a2a2a;color:#888;font-size:18px;-webkit-appearance:none;cursor:pointer;}
</style>

</head>
<body>

<div id="mapDiv">
  <div id="topBar">
    <div class="badge" id="michi">🛰 みちびき対応GPS</div>
    <div class="badge" id="gpsB"><div class="dot" id="gpsDot"></div><span id="gpsT">GPS待機</span></div>
  </div>
  <div id="msgBox"></div>
  <div id="spdBig">
    <div id="spdBigVal">0.0</div>
    <div id="spdBigLbl">km/h</div>
  </div>
</div>

<div id="bottomUI">
  <div id="stats">
    <div class="sb"><div class="sv" id="dVal">0.00</div><div class="sl">距離 km</div></div>
    <div class="sb"><div class="sv" id="tVal">00:00</div><div class="sl">時間</div></div>
    <div class="sb"><div class="sv" id="pVal">--'--"</div><div class="sl">ペース/km</div></div>
  </div>
  <div id="stats2">
    <div class="sb"><div class="sv" id="altVal">--</div><div class="sl">🏔 標高 m</div></div>
    <div class="sb"><div class="sv" id="gainVal">0</div><div class="sl">📈 獲得標高 m</div></div>
    <div class="sb"><div class="sv" id="spdVal">--</div><div class="sl">💨 速度 km/h</div></div>
    <div class="sb"><div class="sv" id="hdgVal">--</div><div class="sl">🧭 方位</div></div>
  </div>
  <div id="btns">
    <button id="btnStart" onclick="startWalk()">▶ スタート</button>
    <button id="btnStop"  onclick="stopWalk()">■ ストップ</button>
    <button id="btnSpot"  onclick="loadCams()">📷</button>
    <button id="btnClear" onclick="clearAll()">🗑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// Leaflet地図初期化
var map = L.map('mapDiv', {
  center: [35.6812, 139.7671],
  zoom: 17,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

// ルートライン
var routeLine = L.polyline([], {
  color: '#22c55e',
  weight: 5,
  opacity: 0.9
}).addTo(map);

// 現在地マーカー
var myIcon = L.divIcon({
  html: '<div style="width:18px;height:18px;border-radius:50%;background:#4ade80;border:3px solid #fff;box-shadow:0 0 0 6px rgba(74,222,128,0.3);"></div>',
  iconSize: [18,18],
  iconAnchor: [9,9],
  className: ''
});
var myMarker = null;

// スタート地点マーカー
var startMarker = null;
var startIcon = L.divIcon({
  html: '<div style="width:14px;height:14px;border-radius:50%;background:#22c55e;border:2px solid #fff;"></div>',
  iconSize: [14,14],
  iconAnchor: [7,7],
  className: ''
});

// GPS・歩行
var walking = false;
var watchId = null;
var startTime = null;
var timerInv = null;
var totalKm = 0;
var path = [];
var totalGain = 0;  // 獲得標高
var lastAlt = null; // 前回の標高

// 方位を日本語に変換
function heading2str(h) {
  if (h === null) return '--';
  var dirs = ['北','北東','東','南東','南','南西','西','北西'];
  return dirs[Math.round(h/45) % 8];
}

function showMsg(txt, ms) {
  var el = document.getElementById('msgBox');
  el.textContent = txt;
  el.style.opacity = 1;
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity=0; }, ms||2500);
}

function startWalk() {
  if (!navigator.geolocation) { showMsg('GPSが使えません',3000); return; }
  walking=true; path=[]; totalKm=0; totalGain=0; lastAlt=null; startTime=Date.now();
  routeLine.setLatLngs([]);
  if (startMarker) { map.removeLayer(startMarker); startMarker=null; }
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='flex';
  document.getElementById('gpsDot').className='dot on';
  document.getElementById('gpsT').textContent='記録中';
  document.getElementById('spdBig').style.display='block';
  // localStorage初期化
  try { localStorage.setItem('sanpo_path', '[]'); localStorage.setItem('sanpo_km','0'); localStorage.setItem('sanpo_start', Date.now()); } catch(e){}
  showMsg('🚶 スタート！');
  timerInv = setInterval(tickTimer, 1000);
  watchId = navigator.geolocation.watchPosition(onGPS, onErr,
    {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopWalk() {
  walking=false;
  if(watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timerInv);
  document.getElementById('btnStart').style.display='flex';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('gpsDot').className='dot';
  document.getElementById('gpsT').textContent='停止';
  document.getElementById('spdBig').style.display='none';
  // 完了データをlocalStorageに保存
  try { localStorage.setItem('sanpo_walking','0'); } catch(e){}
  showMsg('🏁 '+totalKm.toFixed(2)+'km 完了！', 4000);
}

function clearAll() {
  path=[]; totalKm=0; totalGain=0; lastAlt=null;
  routeLine.setLatLngs([]);
  if(startMarker){map.removeLayer(startMarker);startMarker=null;}
  document.getElementById('dVal').textContent='0.00';
  document.getElementById('tVal').textContent='00:00';
  document.getElementById('pVal').textContent="--'--\"";
  document.getElementById('altVal').textContent='--';
  document.getElementById('gainVal').textContent='0';
  document.getElementById('spdVal').textContent='--';
  document.getElementById('hdgVal').textContent='--';
  document.getElementById('spdBig').style.display='none';
  document.getElementById('spdBigVal').textContent='0.0';
  try { localStorage.removeItem('sanpo_path'); localStorage.removeItem('sanpo_km'); localStorage.removeItem('sanpo_start'); localStorage.removeItem('sanpo_walking'); } catch(e){}
  showMsg('クリアしました');
}

function onGPS(pos) {
  var lat=pos.coords.latitude, lng=pos.coords.longitude;
  var acc=Math.round(pos.coords.accuracy);
  document.getElementById('gpsT').textContent='±'+acc+'m';

  // 標高
  var alt = pos.coords.altitude;
  if (alt !== null && alt !== undefined) {
    document.getElementById('altVal').textContent = Math.round(alt);
    // 獲得標高（上りのみ累計）
    if (walking && lastAlt !== null) {
      var diff = alt - lastAlt;
      if (diff > 0.5) { // 0.5m以上の上りのみカウント
        totalGain += diff;
        document.getElementById('gainVal').textContent = Math.round(totalGain);
      }
    }
    lastAlt = alt;
  }

  // 速度（大きく表示 + 小さいボックスも更新）
  var spd = pos.coords.speed;
  if (spd !== null && spd !== undefined && spd >= 0) {
    var spdKmh = (spd * 3.6).toFixed(1);
    document.getElementById('spdVal').textContent = spdKmh;
    document.getElementById('spdBigVal').textContent = spdKmh;
  }

  // 方位
  var hdg = pos.coords.heading;
  if (hdg !== null && hdg !== undefined && !isNaN(hdg)) {
    document.getElementById('hdgVal').textContent = heading2str(hdg);
  }

  // マーカー更新
  if (!myMarker) {
    myMarker = L.marker([lat,lng], {icon:myIcon, zIndexOffset:1000}).addTo(map);
  } else {
    myMarker.setLatLng([lat,lng]);
  }
  map.setView([lat,lng], map.getZoom(), {animate:true, duration:0.5});

  if (walking) {
    if (path.length > 0) {
      var last=path[path.length-1];
      var d=haversine(last[0],last[1],lat,lng);
      if (d > 0.003 && d < 0.3) {
        totalKm+=d;
        path.push([lat,lng]);
        routeLine.setLatLngs(path);
        document.getElementById('dVal').textContent=totalKm.toFixed(2);
        // localStorageに保存（復元用）
        try {
          localStorage.setItem('sanpo_path', JSON.stringify(path));
          localStorage.setItem('sanpo_km', totalKm.toFixed(3));
          localStorage.setItem('sanpo_walking', '1');
        } catch(e){}
      }
    } else {
      path.push([lat,lng]);
      routeLine.setLatLngs(path);
      startMarker = L.marker([lat,lng], {icon:startIcon}).addTo(map);
      try { localStorage.setItem('sanpo_path', JSON.stringify(path)); } catch(e){}
    }
  }
}

function onErr(e) { showMsg('GPSエラー: '+e.message, 3000); }

function tickTimer() {
  if (!startTime) return;
  var s=Math.floor((Date.now()-startTime)/1000);
  var m=Math.floor(s/60), ss=s%60;
  document.getElementById('tVal').textContent=(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
  if (totalKm>0.05) {
    var pps=s/totalKm;
    var pm=Math.floor(pps/60), ps=Math.floor(pps%60);
    document.getElementById('pVal').textContent=pm+"'"+(ps<10?'0':'')+ps+'"';
  }
}

function haversine(lat1,lng1,lat2,lng2) {
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ===== ライブカメラ =====
var camMarkers = [];
var camsVisible = false;

// 公開ライブカメラデータ（国交省・気象庁・河川）
// ※実際のカメラはOpenStreetMapのman_made=surveillance(public)タグから取得
var camIcon = L.divIcon({
  html: '<div style="background:#2563eb;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);">📷</div>',
  iconSize: [40,40], iconAnchor: [20,20], className:''
});

function loadCams() {
  var center = map.getCenter();
  var lat = center.lat, lng = center.lng;

  if (camsVisible) {
    for (var i=0; i<camMarkers.length; i++) map.removeLayer(camMarkers[i]);
    camMarkers = [];
    camsVisible = false;
    document.getElementById('btnSpot').style.opacity = '1';
    showMsg('カメラを非表示にしました');
    return;
  }

  showMsg('📷 ライブカメラを検索中...', 4000);

  // Overpass APIで公開カメラを取得
  var r = 3000; // 3km圏内
  var query = '[out:json][timeout:15];('
    + 'node["man_made"="surveillance"]["surveillance:type"="outdoor"](around:'+r+','+lat+','+lng+');'
    + 'node["man_made"="surveillance"]["access"="yes"](around:'+r+','+lat+','+lng+');'
    + 'node["man_made"="surveillance"]["surveillance"="public"](around:'+r+','+lat+','+lng+');'
    + ');out body;';

  var url = 'https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query);

  fetch(url)
    .then(function(res){ return res.json(); })
    .then(function(data) {
      var found = 0;

      if (data.elements) {
        for (var i=0; i<data.elements.length; i++) {
          var el = data.elements[i];
          if (!el.lat || !el.lon) continue;
          var name = el.tags.name || el.tags.description || 'ライブカメラ';
          var url2 = el.tags.url || el.tags.website || null;

          var popup = '<div style="font-size:14px;font-weight:bold;color:#333;">📷 '+name+'</div>';
          if (url2) {
            popup += '<div style="margin-top:6px;"><a href="'+url2+'" target="_blank" style="color:#2563eb;font-size:12px;">▶ カメラを見る</a></div>';
          } else {
            popup += '<div style="font-size:11px;color:#999;margin-top:4px;">映像リンクなし</div>';
          }

          var m = L.marker([el.lat, el.lon], {icon: camIcon}).addTo(map);
          m.bindPopup(popup, {maxWidth:220});
          camMarkers.push(m);
          found++;
        }
      }

      // OpenStreetMapで見つからない場合、国交省の主要カメラを手動で補完
      if (found === 0) {
        addPublicCams(lat, lng);
      } else {
        camsVisible = true;
        document.getElementById('btnSpot').style.opacity = '0.5';
        showMsg('📷 '+found+'件のカメラを表示', 3000);
      }
    })
    .catch(function() {
      addPublicCams(lat, lng);
    });
}

// 国交省・気象庁の主要公開カメラ（全国の代表的なもの）
var PUBLIC_CAMS = [
  {lat:35.6586,lng:139.7454,name:'東京タワー周辺（国交省）',url:'https://www.kensetsu.metro.tokyo.lg.jp/content/000051346.pdf'},
  {lat:35.0116,lng:135.7681,name:'京都・鴨川ライブカメラ',url:'https://www.city.kyoto.lg.jp/kankyo/page/0000290369.html'},
  {lat:34.6937,lng:135.5023,name:'大阪・道頓堀（国交省）',url:'https://www.kkr.mlit.go.jp/osaka/road/camera/'},
  {lat:35.3606,lng:138.7274,name:'富士山ライブカメラ（気象庁）',url:'https://www.jma.go.jp/bosai/nowc/'},
  {lat:43.0642,lng:141.3469,name:'札幌・大通公園（国交省）',url:'https://www.hkd.mlit.go.jp/rs/douro/camera/'},
  {lat:26.2124,lng:127.6792,name:'那覇・国際通り',url:'https://www.dc.ogb.go.jp/douro/camera/'},
  {lat:38.2688,lng:140.8721,name:'仙台・広瀬川（国交省河川）',url:'https://www.thr.mlit.go.jp/river/bousai/pc/'},
  {lat:33.5904,lng:130.4017,name:'福岡・那珂川（河川カメラ）',url:'https://www.qsr.mlit.go.jp/chikugo/bousai/camera/'},
  {lat:35.4437,lng:139.6380,name:'横浜・鶴見川（国交省）',url:'https://www.ktr.mlit.go.jp/keihin/keihin00213.html'},
  {lat:34.3853,lng:132.4553,name:'広島・太田川（国交省）',url:'https://www.cgr.mlit.go.jp/chugoku/camera/'},
];

function addPublicCams(centerLat, centerLng) {
  // 現在地から近い順に並べる
  var sorted = PUBLIC_CAMS.slice().sort(function(a,b) {
    var da = Math.sqrt(Math.pow(a.lat-centerLat,2)+Math.pow(a.lng-centerLng,2));
    var db = Math.sqrt(Math.pow(b.lat-centerLat,2)+Math.pow(b.lng-centerLng,2));
    return da-db;
  });

  for (var i=0; i<sorted.length; i++) {
    var c = sorted[i];
    var popup = '<div style="font-size:13px;font-weight:bold;color:#333;">📷 '+c.name+'</div>'
      + '<div style="margin-top:6px;"><a href="'+c.url+'" target="_blank" style="color:#2563eb;font-size:12px;font-weight:bold;">▶ カメラページを開く</a></div>'
      + '<div style="font-size:10px;color:#999;margin-top:3px;">外部サイトへ移動します</div>';
    var m = L.marker([c.lat, c.lng], {icon: camIcon}).addTo(map);
    m.bindPopup(popup, {maxWidth:240});
    camMarkers.push(m);
  }

  camsVisible = true;
  document.getElementById('btnSpot').style.opacity = '0.5';
  showMsg('📷 公開ライブカメラを表示しました', 3000);
}

// 起動時GPS取得 + ルート復元
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {
    map.setView([pos.coords.latitude, pos.coords.longitude], 17);
    myMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {icon:myIcon}).addTo(map);
    showMsg('📍 現在地を取得しました');
  }, function() {
    showMsg('現在地を取得できませんでした', 3000);
  }, {enableHighAccuracy:true, timeout:10000});
}

// localStorage からルート復元
try {
  var savedPath = localStorage.getItem('sanpo_path');
  var savedKm   = localStorage.getItem('sanpo_km');
  var savedWalking = localStorage.getItem('sanpo_walking');
  var savedStart = localStorage.getItem('sanpo_start');

  if (savedPath) {
    var restored = JSON.parse(savedPath);
    if (restored && restored.length > 1) {
      path = restored;
      totalKm = savedKm ? parseFloat(savedKm) : 0;
      routeLine.setLatLngs(path);
      // スタートマーカー復元
      startMarker = L.marker([path[0][0], path[0][1]], {icon:startIcon}).addTo(map);
      document.getElementById('dVal').textContent = totalKm.toFixed(2);
      // 記録中だったら再開
      if (savedWalking === '1') {
        walking = true;
        startTime = savedStart ? parseInt(savedStart) : Date.now();
        document.getElementById('btnStart').style.display='none';
        document.getElementById('btnStop').style.display='flex';
        document.getElementById('gpsDot').className='dot on';
        document.getElementById('gpsT').textContent='記録中';
        document.getElementById('spdBig').style.display='block';
        timerInv = setInterval(tickTimer, 1000);
        watchId = navigator.geolocation.watchPosition(onGPS, onErr,
          {enableHighAccuracy:true, timeout:15000, maximumAge:0});
        showMsg('📍 記録を再開しました', 3000);
      } else {
        showMsg('📍 前回のルートを復元しました', 3000);
      }
    }
  }
} catch(e) {}
</script>

</body>
</html>
