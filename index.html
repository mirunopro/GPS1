<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>散歩記録</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Hiragino Sans',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

#mapWrap{flex:1;position:relative;overflow:hidden;background:#aad3df;}

/* タイル層 */
#tileLayer{position:absolute;top:0;left:0;width:100%;height:100%;}
.tile{position:absolute;width:256px;height:256px;image-rendering:auto;}

/* ルートSVG層 */
#routeSvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* 現在地マーカー */
#myDot{
position:absolute;width:22px;height:22px;
transform:translate(-50%,-50%);
display:none;pointer-events:none;z-index:10;
}
#myDot::before{
content:’’;position:absolute;inset:0;
background:#4ade80;border-radius:50%;
border:3px solid #fff;
box-shadow:0 2px 8px rgba(0,0,0,0.4);
animation:rpl 2s infinite;
}
#myDot::after{
content:’’;position:absolute;inset:-10px;
background:rgba(74,222,128,0.2);border-radius:50%;
}
@keyframes rpl{0%{box-shadow:0 2px 8px rgba(0,0,0,0.4),0 0 0 0 rgba(74,222,128,0.5);}100%{box-shadow:0 2px 8px rgba(0,0,0,0.4),0 0 0 18px rgba(74,222,128,0);}}

/* UI */
#topBar{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:20;pointer-events:none;}
.badge{border-radius:20px;padding:6px 12px;font-size:11px;backdrop-filter:blur(4px);}
#michi{background:rgba(0,0,60,0.8);border:1px solid rgba(100,150,255,0.4);color:#aac4ff;}
#gpsB{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:5px;}
.dot{width:8px;height:8px;border-radius:50%;background:#666;}
.dot.on{background:#4ade80;animation:bl 1.5s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:0.2;}}

#msgBox{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border-radius:20px;padding:7px 18px;font-size:13px;white-space:nowrap;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.3s;max-width:90%;}

#zoomBtns{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px;z-index:20;}
.zbtn{width:42px;height:42px;border-radius:10px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.9);color:#333;font-size:22px;font-weight:700;-webkit-appearance:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

#scaleBar{position:absolute;left:12px;bottom:14px;z-index:20;display:flex;flex-direction:column;gap:2px;}
#scaleLine{width:80px;height:3px;background:#333;border-radius:2px;}
#scaleTxt{font-size:10px;color:#333;font-weight:600;}

/* 下部UI */
#bottomUI{background:#1a1a1a;padding:12px 16px 30px;border-top:1px solid #333;}
#stats{display:flex;gap:8px;margin-bottom:12px;}
.sb{flex:1;background:#222;border-radius:12px;padding:10px;text-align:center;border:1px solid #333;}
.sv{font-size:22px;font-weight:700;color:#4ade80;}
.sl{font-size:10px;color:#666;margin-top:2px;}
#btns{display:flex;gap:10px;}
#btnStart{flex:1;height:54px;border-radius:14px;border:none;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:16px;font-weight:700;-webkit-appearance:none;cursor:pointer;}
#btnStop{flex:1;height:54px;border-radius:14px;border:none;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:16px;font-weight:700;-webkit-appearance:none;cursor:pointer;display:none;}
#btnClear{width:54px;height:54px;border-radius:14px;border:none;background:#2a2a2a;color:#888;font-size:18px;-webkit-appearance:none;cursor:pointer;}
</style>

</head>
<body>

<div id="mapWrap">
  <div id="tileLayer"></div>
  <svg id="routeSvg"></svg>
  <div id="myDot"></div>
  <div id="topBar">
    <div class="badge" id="michi">🛰 みちびき対応GPS</div>
    <div class="badge" id="gpsB"><div class="dot" id="gpsDot"></div><span id="gpsT">GPS待機</span></div>
  </div>
  <div id="msgBox"></div>
  <div id="zoomBtns">
    <button class="zbtn" onclick="zoomIn()">+</button>
    <button class="zbtn" onclick="zoomOut()">−</button>
  </div>
  <div id="scaleBar"><div id="scaleLine"></div><div id="scaleTxt"></div></div>
</div>

<div id="bottomUI">
  <div id="stats">
    <div class="sb"><div class="sv" id="dVal">0.00</div><div class="sl">距離 km</div></div>
    <div class="sb"><div class="sv" id="tVal">00:00</div><div class="sl">時間</div></div>
    <div class="sb"><div class="sv" id="pVal">--'--"</div><div class="sl">ペース/km</div></div>
  </div>
  <div id="btns">
    <button id="btnStart" onclick="startWalk()">▶ スタート</button>
    <button id="btnStop"  onclick="stopWalk()">■ ストップ</button>
    <button id="btnClear" onclick="clearAll()">🗑</button>
  </div>
</div>

<script>
// ===== タイル地図 =====
var TILE_SIZE = 256;
var zoom = 17;
var centerLat = 35.6812;
var centerLng = 139.7671;

function lat2tile(lat, z) {
  return Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2 * Math.pow(2,z));
}
function lng2tile(lng, z) {
  return Math.floor((lng+180)/360 * Math.pow(2,z));
}
function tile2lat(y, z) {
  var n = Math.PI - 2*Math.PI*y/Math.pow(2,z);
  return 180/Math.PI * Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));
}
function tile2lng(x, z) {
  return x/Math.pow(2,z)*360-180;
}

// 緯度経度 → 画面ピクセル
function ll2px(lat, lng) {
  var W = document.getElementById('mapWrap').clientWidth;
  var H = document.getElementById('mapWrap').clientHeight;
  var cx = lng2tile(centerLng, zoom) + (centerLng - tile2lng(lng2tile(centerLng,zoom), zoom)) / (tile2lng(lng2tile(centerLng,zoom)+1,zoom) - tile2lng(lng2tile(centerLng,zoom),zoom));
  var cy = lat2tile(centerLat, zoom) + (tile2lat(lat2tile(centerLat,zoom),zoom) - centerLat) / (tile2lat(lat2tile(centerLat,zoom),zoom) - tile2lat(lat2tile(centerLat,zoom)+1,zoom));
  var px = lng2tile(lng, zoom) + (lng - tile2lng(lng2tile(lng,zoom), zoom)) / (tile2lng(lng2tile(lng,zoom)+1,zoom) - tile2lng(lng2tile(lng,zoom),zoom));
  var py = lat2tile(lat, zoom) + (tile2lat(lat2tile(lat,zoom),zoom) - lat) / (tile2lat(lat2tile(lat,zoom),zoom) - tile2lat(lat2tile(lat,zoom)+1,zoom));
  return {
    x: W/2 + (px - cx)*TILE_SIZE,
    y: H/2 + (py - cy)*TILE_SIZE
  };
}

var tileImgs = {};

function renderMap() {
  var wrap = document.getElementById('mapWrap');
  var W = wrap.clientWidth, H = wrap.clientHeight;
  var layer = document.getElementById('tileLayer');

  var cx = lng2tile(centerLng, zoom) * TILE_SIZE + Math.floor((centerLng - tile2lng(lng2tile(centerLng,zoom),zoom)) / (tile2lng(lng2tile(centerLng,zoom)+1,zoom)-tile2lng(lng2tile(centerLng,zoom),zoom)) * TILE_SIZE);
  var cy = lat2tile(centerLat, zoom) * TILE_SIZE + Math.floor((tile2lat(lat2tile(centerLat,zoom),zoom)-centerLat) / (tile2lat(lat2tile(centerLat,zoom),zoom)-tile2lat(lat2tile(centerLat,zoom)+1,zoom)) * TILE_SIZE);

  var x0 = Math.floor((cx - W/2) / TILE_SIZE);
  var y0 = Math.floor((cy - H/2) / TILE_SIZE);
  var x1 = Math.ceil((cx + W/2) / TILE_SIZE);
  var y1 = Math.ceil((cy + H/2) / TILE_SIZE);
  var maxT = Math.pow(2, zoom);

  // 古いタイルを削除
  layer.innerHTML = '';

  for (var ty = y0; ty <= y1; ty++) {
    for (var tx = x0; tx <= x1; tx++) {
      if (tx < 0 || ty < 0 || tx >= maxT || ty >= maxT) continue;
      var key = zoom+'_'+tx+'_'+ty;
      var px = tx*TILE_SIZE - cx + W/2;
      var py = ty*TILE_SIZE - cy + H/2;

      var img = document.createElement('img');
      img.className = 'tile';
      img.style.left = px + 'px';
      img.style.top  = py + 'px';
      img.src = 'https://tile.openstreetmap.org/'+zoom+'/'+tx+'/'+ty+'.png';
      img.onload = function() { renderRoute(); };
      layer.appendChild(img);
    }
  }

  renderRoute();
  updateScale();
}

function updateScale() {
  var mpx = 156543.03 * Math.cos(centerLat*Math.PI/180) / Math.pow(2,zoom);
  var m = Math.round(mpx * 80);
  var txt = m >= 1000 ? (m/1000).toFixed(1)+'km' : m+'m';
  document.getElementById('scaleTxt').textContent = txt;
}

// ===== ルート描画 =====
var path = [];
var currentPos = null;

function renderRoute() {
  var svg = document.getElementById('routeSvg');
  var W = document.getElementById('mapWrap').clientWidth;
  var H = document.getElementById('mapWrap').clientHeight;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.innerHTML = '';

  if (path.length > 1) {
    var d = '';
    for (var i = 0; i < path.length; i++) {
      var p = ll2px(path[i].lat, path[i].lng);
      d += (i===0?'M':'L') + p.x.toFixed(1)+' '+p.y.toFixed(1)+' ';
    }
    // 光るライン（下層）
    var glow = document.createElementNS('http://www.w3.org/2000/svg','path');
    glow.setAttribute('d', d);
    glow.setAttribute('fill','none');
    glow.setAttribute('stroke','rgba(74,222,128,0.4)');
    glow.setAttribute('stroke-width','10');
    glow.setAttribute('stroke-linecap','round');
    glow.setAttribute('stroke-linejoin','round');
    svg.appendChild(glow);
    // メインライン
    var line = document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d', d);
    line.setAttribute('fill','none');
    line.setAttribute('stroke','#22c55e');
    line.setAttribute('stroke-width','4');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-linejoin','round');
    svg.appendChild(line);
    // スタート丸
    var ps = ll2px(path[0].lat, path[0].lng);
    var sc = document.createElementNS('http://www.w3.org/2000/svg','circle');
    sc.setAttribute('cx', ps.x); sc.setAttribute('cy', ps.y); sc.setAttribute('r','7');
    sc.setAttribute('fill','#22c55e'); sc.setAttribute('stroke','#fff'); sc.setAttribute('stroke-width','2');
    svg.appendChild(sc);
  }

  // 現在地
  if (currentPos) {
    var cp = ll2px(currentPos.lat, currentPos.lng);
    var dot = document.getElementById('myDot');
    dot.style.display = 'block';
    dot.style.left = cp.x + 'px';
    dot.style.top  = cp.y + 'px';
  }
}

// ===== タッチ操作 =====
var drag = {on:false, lx:0, ly:0};
var pinchDist0 = 0;

document.getElementById('mapWrap').addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    drag.on = true;
    drag.lx = e.touches[0].clientX;
    drag.ly = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchDist0 = Math.sqrt(dx*dx+dy*dy);
  }
}, {passive:true});

document.getElementById('mapWrap').addEventListener('touchmove', function(e) {
  if (e.touches.length === 1 && drag.on) {
    var dx = e.touches[0].clientX - drag.lx;
    var dy = e.touches[0].clientY - drag.ly;
    var mpx = 156543.03 * Math.cos(centerLat*Math.PI/180) / Math.pow(2,zoom);
    var R = 6378137;
    centerLng -= dx * mpx / (R * Math.cos(centerLat*Math.PI/180)) * 180/Math.PI;
    var latRad = centerLat*Math.PI/180;
    var mercY = Math.log(Math.tan(Math.PI/4 + latRad/2));
    mercY += dy * mpx / R;
    centerLat = (2*Math.atan(Math.exp(mercY)) - Math.PI/2) * 180/Math.PI;
    drag.lx = e.touches[0].clientX;
    drag.ly = e.touches[0].clientY;
    renderMap();
  } else if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if (pinchDist0 > 0) {
      if (dist > pinchDist0*1.4 && zoom < 19) { zoom++; pinchDist0=dist; renderMap(); }
      if (dist < pinchDist0*0.7 && zoom > 12) { zoom--; pinchDist0=dist; renderMap(); }
    }
  }
}, {passive:true});

document.getElementById('mapWrap').addEventListener('touchend', function() {
  drag.on = false;
}, {passive:true});

function zoomIn()  { if(zoom<19){zoom++;renderMap();} }
function zoomOut() { if(zoom>12){zoom--;renderMap();} }

// ===== GPS・散歩 =====
var walking = false;
var watchId = null;
var startTime = null;
var timerInv = null;
var totalKm = 0;

function showMsg(txt, ms) {
  var el = document.getElementById('msgBox');
  el.textContent = txt;
  el.style.opacity = 1;
  setTimeout(function(){ el.style.opacity=0; }, ms||2500);
}

function startWalk() {
  if (!navigator.geolocation) { showMsg('GPSが使えません',3000); return; }
  walking=true; path=[]; totalKm=0; startTime=Date.now();
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='flex';
  document.getElementById('gpsDot').className='dot on';
  document.getElementById('gpsT').textContent='記録中';
  showMsg('🚶 スタート！');
  timerInv = setInterval(tickTimer, 1000);
  watchId = navigator.geolocation.watchPosition(onGPS, onErr,
    {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopWalk() {
  walking=false;
  if(watchId) navigator.geolocation.clearWatch(watchId);
  clearInterval(timerInv);
  document.getElementById('btnStart').style.display='flex';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('gpsDot').className='dot';
  document.getElementById('gpsT').textContent='停止';
  showMsg('🏁 '+totalKm.toFixed(2)+'km 完了！', 4000);
}

function clearAll() {
  path=[]; totalKm=0; currentPos=null;
  document.getElementById('dVal').textContent='0.00';
  document.getElementById('tVal').textContent='00:00';
  document.getElementById('pVal').textContent="--'--\"";
  document.getElementById('myDot').style.display='none';
  renderRoute();
  showMsg('クリアしました');
}

function onGPS(pos) {
  var lat=pos.coords.latitude, lng=pos.coords.longitude;
  var acc=Math.round(pos.coords.accuracy);
  document.getElementById('gpsT').textContent='±'+acc+'m';
  currentPos={lat:lat, lng:lng};
  centerLat=lat; centerLng=lng;
  if (walking) {
    if (path.length > 0) {
      var last=path[path.length-1];
      var d=haversine(last.lat,last.lng,lat,lng);
      if (d > 0.003 && d < 0.3) {
        totalKm+=d;
        path.push({lat:lat,lng:lng});
        document.getElementById('dVal').textContent=totalKm.toFixed(2);
      }
    } else {
      path.push({lat:lat,lng:lng});
    }
  }
  renderMap();
}

function onErr(e) { showMsg('GPSエラー: '+e.message, 3000); }

function tickTimer() {
  if (!startTime) return;
  var s=Math.floor((Date.now()-startTime)/1000);
  var m=Math.floor(s/60), ss=s%60;
  document.getElementById('tVal').textContent=(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
  if (totalKm>0.05) {
    var pps=s/totalKm;
    var pm=Math.floor(pps/60), ps=Math.floor(pps%60);
    document.getElementById('pVal').textContent=pm+"'"+(ps<10?'0':'')+ps+'"';
  }
}

function haversine(lat1,lng1,lat2,lng2) {
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 起動時GPS
window.addEventListener('load', function() {
  renderMap();
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      centerLat=pos.coords.latitude;
      centerLng=pos.coords.longitude;
      currentPos={lat:centerLat, lng:centerLng};
      renderMap();
      showMsg('📍 現在地を取得しました');
    }, function() {
      showMsg('現在地を取得できませんでした', 3000);
    }, {enableHighAccuracy:true, timeout:10000});
  }
});

window.addEventListener('resize', function() { renderMap(); });
</script>

</body>
</html>
